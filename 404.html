<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>

  <script>
    (function () {
      var l = window.location;

      var repo = "/";

      l.replace(
        repo +
        "?/" +
        l.pathname.slice(repo.length).replace(/^\/+/, "") +
        l.search.replace(/^\?/, "&") +
        l.hash
      );
    })();
  </script>

</head>

<body></body>

</html>
