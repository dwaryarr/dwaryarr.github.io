<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#05060a" />
    <title>Your Name — Full-Stack Developer & Designer</title>
    <meta name="description" content="Portfolio of Your Name — full-stack developer building fast, elegant, accessible web experiences." />
    <meta name="author" content="Your Name" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name — Full-Stack Developer & Designer" />
    <meta property="og:description" content="Portfolio of Your Name — full-stack developer building fast, elegant, accessible web experiences." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourdomain.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Name — Full-Stack Developer & Designer" />
    <meta name="twitter:description" content="Portfolio of Your Name — full-stack developer building fast, elegant, accessible web experiences." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Your Name",
        "url": "https://yourdomain.com/",
        "jobTitle": "Full-Stack Developer",
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourusername"
        ]
      }
    </script>
  </head>
  <body class="bg-ink-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
